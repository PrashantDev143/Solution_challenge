version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    container_name: biasxray-backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml-engine:/ml-engine

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    container_name: biasxray-frontend
    env_file:
      - frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
